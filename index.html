<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام متابعة القصص</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --failed-color: #c0392b;
            --neutral-color: #95a5a6;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: #555;
        }

        input[type="email"],
        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
            height: 100px;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #eee;
        }

        .status-label {
            font-size: 0.9rem;
            flex-grow: 1;
            margin-left: 10px;
        }

        .status-options {
            display: flex;
            gap: 10px;
        }

        .status-options input[type="radio"] {
            display: none;
        }

        .status-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid #ddd;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: transparent;
            transition: all 0.3s ease;
        }

        .status-icon.neutral::before {
            content: "−";
            color: #95a5a6;
            font-weight: bold;
        }
        
        .status-options input[value="neutral"]:checked + .status-icon {
            border-color: var(--neutral-color);
            background-color: #ecf0f1;
        }

        .status-icon.success::before {
            content: "✓";
            color: white;
        }

        .status-options input[value="success"]:checked + .status-icon {
            background-color: var(--success-color);
            border-color: var(--success-color);
            box-shadow: 0 0 10px rgba(39, 174, 96, 0.4);
        }

        .status-icon.failed::before {
            content: "✕";
            color: white;
            font-size: 20px;
        }

        .status-options input[value="failed"]:checked + .status-icon {
            background-color: var(--failed-color);
            border-color: var(--failed-color);
            box-shadow: 0 0 10px rgba(192, 57, 43, 0.4);
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #2980b9;
        }

        .submit-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>تحديث حالة القصة</h2>
    <form id="storyForm">
        
        <div class="form-group">
            <label>البريد الإلكتروني للكاتب</label>
            <input type="email" id="email" name="email" required placeholder="example@mail.com">
        </div>

        <div class="form-group">
            <label>عنوان القصة</label>
            <input type="text" id="title" name="title" required placeholder="اكتب عنوان القصة هنا">
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

        <div class="status-row">
            <span class="status-label">تم استلام طلبك</span>
            <div class="status-options">
                <label>
                    <input type="radio" name="step1" value="neutral" checked>
                    <span class="status-icon neutral"></span>
                </label>
                <label>
                    <input type="radio" name="step1" value="success">
                    <span class="status-icon success"></span>
                </label>
                <label>
                    <input type="radio" name="step1" value="failed">
                    <span class="status-icon failed"></span>
                </label>
            </div>
        </div>

        <div class="status-row">
            <span class="status-label">تم مراجعة المحتوى</span>
            <div class="status-options">
                <label>
                    <input type="radio" name="step2" value="neutral" checked>
                    <span class="status-icon neutral"></span>
                </label>
                <label>
                    <input type="radio" name="step2" value="success">
                    <span class="status-icon success"></span>
                </label>
                <label>
                    <input type="radio" name="step2" value="failed">
                    <span class="status-icon failed"></span>
                </label>
            </div>
        </div>

        <div class="status-row">
            <span class="status-label">مراجعة لغوية ونحوية</span>
            <div class="status-options">
                <label>
                    <input type="radio" name="step3" value="neutral" checked>
                    <span class="status-icon neutral"></span>
                </label>
                <label>
                    <input type="radio" name="step3" value="success">
                    <span class="status-icon success"></span>
                </label>
                <label>
                    <input type="radio" name="step3" value="failed">
                    <span class="status-icon failed"></span>
                </label>
            </div>
        </div>

        <div class="status-row">
            <span class="status-label">القبول بالمكتبة</span>
            <div class="status-options">
                <label>
                    <input type="radio" name="step4" value="neutral" checked>
                    <span class="status-icon neutral"></span>
                </label>
                <label>
                    <input type="radio" name="step4" value="success">
                    <span class="status-icon success"></span>
                </label>
                <label>
                    <input type="radio" name="step4" value="failed">
                    <span class="status-icon failed"></span>
                </label>
            </div>
        </div>

        <div class="form-group">
            <label>الملاحظات</label>
            <textarea id="notes" name="notes" placeholder="أضف أي ملاحظات إضافية..."></textarea>
        </div>

        <button type="submit" class="submit-btn" id="sendBtn">إرسال التحديث</button>
    </form>
</div>

<script>
    (function() {
        emailjs.init("HEgMSXV2gcQ_27WMg");
    })();

    document.getElementById('storyForm').addEventListener('submit', function(event) {
        event.preventDefault();
        
        const btn = document.getElementById('sendBtn');
        btn.innerText = "جاري الإرسال...";
        btn.disabled = true;

        const formData = {
            email: document.getElementById('email').value,
            title: document.getElementById('title').value,
            notes: document.getElementById('notes').value,
            step1: document.querySelector('input[name="step1"]:checked').value,
            step2: document.querySelector('input[name="step2"]:checked').value,
            step3: document.querySelector('input[name="step3"]:checked').value,
            step4: document.querySelector('input[name="step4"]:checked').value,
        };

        if(!formData.email || !formData.title) {
            alert("الرجاء ملء الإيميل والعنوان أولاً!");
            btn.innerText = "إرسال التحديث";
            btn.disabled = false;
            return;
        }

        const serviceID = 'service_dwyyp0m';
        const templateID = 'template_ji4riqg';

        emailjs.send(serviceID, templateID, formData)
            .then(function() {
                alert('✅ تم الإرسال بنجاح!');
                btn.innerText = "إرسال التحديث";
                btn.disabled = false;
                document.getElementById('storyForm').reset();
            }, function(err) {
                let errorMsg = "❌ حدث خطأ غير معروف.";
                if (err.text) {
                    errorMsg = "❌ خطأ: " + err.text;
                } else if (err.status) {
                    errorMsg = "❌ خطأ في الاتصال (Code: " + err.status + ")";
                }
                
                alert(errorMsg + "\n\nتأكد من:\n1. المفاتيح صحيحة.\n2. القالب مفعل.");
                btn.innerText = "إرسال التحديث";
                btn.disabled = false;
            });
    });
</script>

</body>
</html>
